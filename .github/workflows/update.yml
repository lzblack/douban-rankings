name: Update rankings

on:
  schedule:
    - cron: '0 3 1-7 * 0'  # First Sunday of each month, 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write   # auto-commit data/
  issues: write     # read by the health-alert workflow downstream

concurrency:
  group: update-rankings
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    # Cold-start Criterion resolution can hit Douban search for ~100-300
    # titles @ 5s/req; 240 min buffer covers that. Incremental monthly
    # runs finish in <10 min once data/movie.json has the resolved cache.
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        # Reads `packageManager` from package.json for version pinning.

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run pipeline
        run: pnpm run update

      - name: Commit data changes
        run: |
          git config user.name "rankings-bot"
          git config user.email "bot@users.noreply.github.com"
          # Guard: never clobber good data with a degraded run. The snapshot
          # files (config/*-snapshot.json) and manual-mapping.yaml are
          # gitignored — the CI runner only has what the scheduled pipeline
          # can scrape live, which is a minority of sources. Everything that
          # depends on a snapshot reports failed → overall=degraded.
          # Publishing that would shrink data/movie.json from ~2,200 dbids
          # to a few hundred. Only commit when the run is clean.
          overall=$(jq -r '.overall' data/health.json 2>/dev/null || echo unknown)
          if [ "$overall" != "ok" ]; then
            echo "health.json overall=$overall → skipping commit to avoid clobbering data/."
            echo "Refresh is maintainer-local: run fetchers locally, then commit and push data/."
            exit 0
          fi
          git add data/
          # `git diff --cached` sees staged changes including new files;
          # `git diff data/` would miss untracked new files (first run case).
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi
          # Commit message carries the summary; pipeline already printed
          # details in job logs. A structured format is a v2 concern.
          git commit -m "data: scheduled update"
          git push
