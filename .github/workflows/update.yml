name: Update rankings

on:
  schedule:
    - cron: '0 3 1-7 * 0'  # First Sunday of each month, 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write   # auto-commit data/
  issues: write     # read by the health-alert workflow downstream

concurrency:
  group: update-rankings
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    # Cold-start Criterion resolution can hit Douban search for ~100-300
    # titles @ 5s/req; 240 min buffer covers that. Incremental monthly
    # runs finish in <10 min once data/movie.json has the resolved cache.
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        # Reads `packageManager` from package.json for version pinning.

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run pipeline
        run: pnpm run update

      - name: Commit health report
        run: |
          git config user.name "rankings-bot"
          git config user.email "bot@users.noreply.github.com"
          # In CI, snapshot-dependent sources report status=skipped (their
          # config/*-snapshot.json is gitignored and absent from the runner),
          # and writer still rebuilds data/movie.json + data/music.json from
          # whatever did run — i.e. only the live-scrape sources (IMDb, AFI).
          # Committing that would shrink the published data from ~2,200
          # dbids to a few hundred. So: only the health report ships from
          # CI. It carries the monitoring signal (consecutiveFailures for
          # live sources → alerts via health-alert workflow) without
          # touching data/movie.json or data/music.json.
          git add data/health.json
          if git diff --cached --quiet; then
            echo "No health changes."
            exit 0
          fi
          git commit -m "health: scheduled check"
          git push
