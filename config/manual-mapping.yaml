# Human-curated fallback for external IDs that automated matchers
# could not resolve to a Douban subject id.
#
# Workflow: after a scrape run, look at the health report for
# "unresolved" external ids. For each, open the title's Douban page
# manually and record its subject id below.

# IMDB title id -> Douban subject id (strings).
imdb: {}

# Title + year overrides, consumed by src/matchers/title-year-to-douban.mjs.
# Key format: "<normalized-title>|<year>".
#   - <normalized-title> is produced by normalizeTitle() in
#     src/util/imdb-datasets.mjs: lowercase, strip common punctuation,
#     & → "and", collapse whitespace. Use manualMappingKey() from the
#     matcher module to compute the exact key for a new override.
#   - <year> is the 4-digit release year as a string.
# Example:
#   titles:
#     "grand illusion|1937": "1294808"
#     "seven samurai|1954": "1295399"
titles: {}
