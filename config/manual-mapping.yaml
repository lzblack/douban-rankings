# Human-curated fallback for external IDs that automated matchers
# could not resolve to a Douban subject id.
#
# Workflow: after a scrape run, look at the health report for
# "unresolved" external ids. For each, open the title's Douban page
# manually and record its subject id below.

# IMDB title id -> Douban subject id.
#
# Value can be a single string or an array:
#   imdb:
#     "tt0110912": "1291561"                          # single dbid
#     "tt0068646": ["1291841", "34447553"]            # legacy + restoration
#
# Use the array form when one IMDB tt corresponds to multiple Douban
# subject pages (original release + 4K restoration + regional cut).
# PtGen dedupes to one dbid per tt, so array overrides are how we
# cover multi-version Douban subjects that the automated layers miss.
imdb: {}

# Title + year overrides, consumed by src/matchers/title-year-to-douban.mjs.
# Key format: "<normalized-title>|<year>".
#   - <normalized-title> is produced by normalizeTitle() in
#     src/util/imdb-datasets.mjs: lowercase, strip common punctuation,
#     & → "and", collapse whitespace. Use manualMappingKey() from the
#     matcher module to compute the exact key for a new override.
#   - <year> is the 4-digit release year as a string.
#   - Value is a single dbid string, or an array of dbids for multi-
#     version Douban subjects.
# Examples:
#   titles:
#     "grand illusion|1937": "1294808"
#     "the godfather|1972": ["1291841", "34447553"]  # legacy + 4K restoration
titles: {}

# Book overrides consumed by src/matchers/book-to-douban.mjs.
# Key format: "<normalized-title>|<normalized-author>" (use empty author
# for title-only fallback). Value is a single dbid or an array of dbids
# (different translations / editions are often distinct Douban subjects).
# Example:
#   books:
#     "beloved|toni morrison": "1007200"
#     "the great gatsby|": ["1040000", "2040000"]  # multiple editions
books: {}
